version = 3.11.0
runner.dialect = scala212source3
align.preset = most    # For pretty alignment.
maxColumn = 130
rewrite.rules = [SortImports]

# build.sbt and meta-build sources run on sbt 2.x (Scala 3)
fileOverride {
  "glob:**/*.sbt" {
    runner.dialect = scala3
  }
  "glob:**/project/**/*.scala" {
    runner.dialect = scala3
  }
}
